<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КИИ РФ — Закон и сферы</title>
</head>
<body>

<h1>Тема: Безопасность Критической инфраструктуры</h1>

<hr>

<!-- Пункты главного меню в столбик -->
<button onclick="showLaw()">1. Статья 2 Федерального закона №187-ФЗ</button>
<br><br>
<button onclick="showSectorsList()">2. Сферы критической информационной инфраструктуры (2.1 – 2.15)</button>

<hr>

<!-- Область для вывода содержимого -->
<div id="outputArea" style="border:1px solid #ccc; padding:12px; background:#fafafa; min-height:200px;">
    <em>Нажмите на пункт 1 или 2, чтобы отобразить информацию.</em>
</div>

<script>
    // Функция для отображения пункта 1: полный текст статьи 2 ФЗ (цитата)
    function showLaw() {
        const lawText = `
            <strong>Федеральный закон от 26.07.2017 N 187-ФЗ (ред. от 07.04.2025) "О безопасности критической информационной инфраструктуры Российской Федерации"</strong><br><br>
            <strong>Статья 2. Основные понятия, используемые в настоящем Федеральном законе</strong><br><br>
            а) <strong>автоматизированная система управления</strong> - комплекс программных и программно-аппаратных средств, предназначенных для контроля за технологическим и (или) производственным оборудованием (исполнительными устройствами) и производимыми ими процессами, а также для управления такими оборудованием и процессами;<br><br>
            б) <strong>безопасность критической информационной инфраструктуры</strong> - состояние защищенности критической информационной инфраструктуры, обеспечивающее ее устойчивое функционирование при проведении в отношении ее компьютерных атак;<br><br>
            в) <strong>значимый объект критической информационной инфраструктуры</strong> - объект критической информационной инфраструктуры, которому присвоена одна из категорий значимости и который включен в реестр значимых объектов критической информационной инфраструктуры;<br><br>
            г) <strong>компьютерная атака</strong> - целенаправленное воздействие программных и (или) программно-аппаратных средств на объекты критической информационной инфраструктуры, сети электросвязи, используемые для организации взаимодействия таких объектов, в целях нарушения и (или) прекращения их функционирования и (или) создания угрозы безопасности обрабатываемой такими объектами информации;<br><br>
            д) <strong>компьютерный инцидент</strong> - факт нарушения и (или) прекращения функционирования объекта критической информационной инфраструктуры, сети электросвязи, используемой для организации взаимодействия таких объектов, и (или) нарушения безопасности обрабатываемой таким объектом информации, в том числе произошедший в результате компьютерной атаки;<br><br>
            е) <strong>критическая информационная инфраструктура</strong> - объекты критической информационной инфраструктуры, а также сети электросвязи, используемые для организации взаимодействия таких объектов;<br><br>
            ж) <strong>объекты критической информационной инфраструктуры</strong> - информационные системы, информационно-телекоммуникационные сети, автоматизированные системы управления субъектов критической информационной инфраструктуры;<br><br>
            з) <strong>субъекты критической информационной инфраструктуры</strong> - государственные органы, государственные учреждения, российские юридические лица, которым на праве собственности, аренды или на ином законном основании принадлежат информационные системы, информационно-телекоммуникационные сети, автоматизированные системы управления, функционирующие в сфере здравоохранения, науки, транспорта, связи, энергетики, государственной регистрации прав на недвижимое имущество и сделок с ним, банковской сфере и иных сферах финансового рынка, топливно-энергетического комплекса, в области атомной энергии, оборонной, ракетно-космической, горнодобывающей, металлургической и химической промышленности, российские юридические лица, которые обеспечивают взаимодействие указанных систем или сетей.<br><br>
            <em>Источник: <a href="https://www.consultant.ru/document/cons_doc_LAW_220885/?ysclid=mnwx4tjuli336018117" target="_blank" rel="noopener noreferrer">КонсультантПлюс</a></em>
        `;
        document.getElementById('outputArea').innerHTML = lawText;
    }

    // Функция, которая показывает список пунктов 2.1 – 2.15
    function showSectorsList() {
        let sectorsHtml = `<strong>Сферы критической информационной инфраструктуры (КИИ):</strong><br><br>
                           <ul style="list-style-type:none; padding-left:0;">`;
        
        const sectors = [
            { num: "2.1", title: "Здравоохранение" },
            { num: "2.2", title: "Наука" },
            { num: "2.3", title: "Транспорт" },
            { num: "2.4", title: "Связь" },
            { num: "2.5", title: "Энергетика" },
            { num: "2.6", title: "Государственная регистрация прав на недвижимое имущество и сделок с ним" },
            { num: "2.7", title: "Банковская сфера и иные сферы финансового рынка" },
            { num: "2.8", title: "Топливно-энергетический комплекс (ТЭК)" },
            { num: "2.9", title: "Атомная энергетика" },
            { num: "2.10", title: "Оборонная промышленность" },
            { num: "2.11", title: "Ракетно-космическая промышленность" },
            { num: "2.12", title: "Горнодобывающая промышленность" },
            { num: "2.13", title: "Металлургическая промышленность" },
            { num: "2.14", title: "Химическая промышленность" },
            { num: "2.15", title: "Российские юридические лица, обеспечивающие взаимодействие систем/сетей" }
        ];
        
        for (let i = 0; i < sectors.length; i++) {
            const s = sectors[i];
            sectorsHtml += `<li style="margin-bottom:8px;">
                                <button onclick="showSectorDetail('${s.num}', '${s.title.replace(/'/g, "\\'")}')">
                                    ${s.num} ${s.title}
                                </button>
                            </li>`;
        }
        sectorsHtml += `</ul><br><em>Нажмите на любой пункт выше, чтобы увидеть подробное описание.</em>`;
        document.getElementById('outputArea').innerHTML = sectorsHtml;
    }

    // Функция для отображения детального текста конкретной сферы
    function showSectorDetail(num, title) {
        let detailText = "";
        
        switch(num) {
            case "2.1":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Медицинские информационные системы государственных и частных клиник, системы управления медицинским оборудованием, базы данных пациентов, электронные медицинские карты, телемедицинские платформы.<br>
                              <em>Пример: ЕГИСЗ НСО (Единая государственная информационная система в сфере здравоохранения Новосибирской области).</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/9/9f/%D0%98%D0%BD%D1%81%D1%82%D0%B8%D1%82%D1%83%D1%82_%D0%BF%D0%B0%D1%82%D0%BE%D0%BB%D0%BE%D0%B3%D0%B8%D0%B8_%D0%BA%D1%80%D0%BE%D0%B2%D0%BE%D0%BE%D0%B1%D1%80%D0%B0%D1%89%D0%B5%D0%BD%D0%B8%D1%8F_%28%D0%9D%D0%BE%D0%B2%D0%BE%D1%81%D0%B8%D0%B1%D0%B8%D1%80%D1%81%D0%BA%29-2.jpg" alt="Институт патологии кровообращения, Новосибирск" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.2":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Информационные системы научных организаций и университетов, которые обрабатывают данные исследований, управляют научным оборудованием или обеспечивают функционирование критически важных научных процессов.<br>
                              <em>Пример: Информационные системы Института автоматики и электрометрии СО РАН.</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/c/c9/Technological_Design_Institute_of_Scientific_Instrument_Engineering.jpg" alt="Институт автоматики и электрометрии СО РАН" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.3":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Системы управления движением поездов, диспетчерские системы аэропортов, системы продажи билетов и бронирования, автоматизированные системы управления транспортными потоками, логистические платформы.<br>
                              <em>Пример: Диспетчерские системы аэропорта Толмачёво.</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/3/37/Tolmachevo_airport_new.jpg" alt="Аэропорт Толмачёво" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.4":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Операторы связи, провайдеры интернет-услуг, дата-центры, облачные сервисы, системы управления телекоммуникационными сетями.<br>
                              <em>Пример: Оператор связи «МТС».</em>`;
                break;
            case "2.5":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Электростанции, системы диспетчеризации энергосетей, автоматизированные системы управления технологическими процессами генерации и передачи электроэнергии, системы учета энергоресурсов.<br>
                              <em>Пример: Информационные системы Новосибирской ГЭС-3.</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/%D0%A2%D0%AD%D0%A6-5_%D0%B2_%D0%B4%D1%8B%D0%BC%D0%BA%D0%B5_-_panoramio.jpg" alt="ТЭЦ-5" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.6":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Информационные системы, обеспечивающие государственную регистрацию прав на недвижимое имущество и сделок с ним, ведение Единого государственного реестра недвижимости.<br>
                              <em>Пример: Информационные системы Росреестра в Кемеровской области.</em>`;
                break;
            case "2.7":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Автоматизированные банковские системы, платежные системы, биржевые торговые платформы, системы дистанционного банковского обслуживания, процессинговые центры.<br>
                              <em>Пример: Автоматизированные банковские системы Сибирского банка ПАО «Сбербанк».</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/%D0%A1%D0%B1%D0%B5%D1%80%D0%B1%D0%B0%D0%BD%D0%BA_%D0%A0%D0%BE%D1%81%D1%81%D0%B8%D0%B8.jpg" alt="Сбербанк России" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.8":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Системы управления добычей, переработкой и транспортировкой нефти и газа, нефтепроводы и газопроводы, нефтеперерабатывающие заводы.<br>
                              <em>Пример: Системы управления нефтепроводами в Томской области.</em>`;
                break;
            case "2.9":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Автоматизированные системы управления атомными электростанциями, системы радиационного контроля, информационные системы предприятий атомной отрасли.<br>
                              <em>Пример: Системы радиационного контроля на Горно-химическом комбинате (ГХК) в Железногорске.</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Rutherford-atom-for_carbon_lg.jpg" alt="Атомная энергетика" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.10":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Информационные системы предприятий оборонно-промышленного комплекса, автоматизированные системы управления производством военной техники.<br>
                              <em>Пример: Системы управления производством на заводе «Сибприбормаш» (Новосибирск).</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/T_34_1942_noBG.png" alt="Оборонная промышленность" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.11":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Системы управления космическими аппаратами, наземные комплексы управления, автоматизированные системы ракетно-космических предприятий.<br>
                              <em>Пример: Информационные системы Сибирского научно-исследовательского института авиации им. Чаломея.</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/3/39/Messier83_-_Heic1403a.jpg" alt="Ракетно-космическая промышленность" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.12":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Автоматизированные системы управления горнодобывающими предприятиями, системы мониторинга безопасности горных работ, диспетчерские системы шахт и карьеров.<br>
                              <em>Пример: Системы мониторинга безопасности на рудниках «Кузбассразрезуголь».</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/c/c6/Himalayas%2C_Ama_Dablam%2C_Nepal.jpg" alt="Горнодобывающая промышленность" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.13":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Автоматизированные системы управления металлургическими комбинатами, системы управления доменными и сталеплавильными процессами.<br>
                              <em>Пример: Системы управления прокатными станами на Красноярском металлургическом заводе.</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/VysokePece1.jpg" alt="Металлургическая промышленность" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.14":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Автоматизированные системы управления химическими производствами, системы контроля опасных технологических процессов, информационные системы химических предприятий.<br>
                              <em>Пример: Автоматизированные системы управления на предприятии «Сибур-Нефтехим» в Тобольске.</em><br><br>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/3/34/%D0%97%D0%B0%D0%B2%D0%BE%D0%BB%D0%B6%D1%81%D0%BA%D0%B8%D0%B9_%D1%85%D0%B8%D0%BC%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B9_%D0%B7%D0%B0%D0%B2%D0%BE%D0%B4.jpg" alt="Химическая промышленность" style="max-width:100%; height:auto; border:1px solid #ccc; margin-top:8px;">`;
                break;
            case "2.15":
                detailText = `<strong>${num} ${title}</strong><br><br>
                              Интеграторы, системные администраторы и поставщики ИТ-услуг для критически важных объектов. Обеспечивают взаимодействие информационных систем, сетей и автоматизированных систем управления субъектов КИИ.<br>
                              <em>Пример: IT-компания «Сибинтек» (Новосибирск).</em>`;
                break;
            default:
                detailText = `<strong>${num} ${title}</strong><br><br>Описание отсутствует.`;
        }
        
        // Добавляем кнопку "Назад к списку сфер" для удобства
        const backButton = `<br><br><button onclick="showSectorsList()">← Назад к списку сфер (2.1 – 2.15)</button>`;
        document.getElementById('outputArea').innerHTML = detailText + backButton;
    }
</script>

</body>
</html>
